name: Moodle Plugin CI

on:
  push:
  pull_request:

jobs:
  ci:
    name: PHP ${{ matrix.php }} / Moodle ${{ matrix.moodle-branch }} / ${{ matrix.config.database }}
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:14
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 3

      mariadb:
        image: mariadb:10.6
        env:
          MYSQL_USER: root
          MYSQL_ALLOW_EMPTY_PASSWORD: "yes"
          MYSQL_CHARACTER_SET_SERVER: utf8mb4
          MYSQL_COLLATION_SERVER: utf8mb4_unicode_ci
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 3

    strategy:
      fail-fast: false
      matrix:
        php: ['8.1', '8.2', '8.3']
        moodle-branch: ['MOODLE_405_STABLE']
        config:
          - database: pgsql
            db-user: postgres
            db-pass: postgres
          - database: mariadb
            db-user: root
            db-pass: ''

    env:
      ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: 'true'

    steps:
      - name: Check out repository code
        uses: actions/checkout@v4
        with:
          path: plugin

      - name: Setup PHP ${{ matrix.php }}
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: mbstring, xml, curl, zip, gd, intl, soap, pgsql, mysqli
          ini-values: max_input_vars=5000
          coverage: none

      - name: Configure PHP max_input_vars
        run: |
          echo "max_input_vars = 5000" | sudo tee -a "$(php -r 'echo php_ini_loaded_file();')"
          php -r 'if (ini_get("max_input_vars") < 5000) exit(1);'

      - name: Initialise moodle-plugin-ci
        run: |
          composer create-project -n --no-dev --prefer-dist moodlehq/moodle-plugin-ci ci ^4
          echo $(cd ci && pwd)/bin >> $GITHUB_PATH
          echo $(cd ci && pwd)/vendor/bin >> $GITHUB_PATH
          sudo locale-gen en_AU.UTF-8
        env:
          COMPOSER_NO_INTERACTION: 1

      - name: Install moodle-plugin-ci
        run: |
          moodle-plugin-ci install \
            --plugin ./plugin \
            --db-host=127.0.0.1 \
            --db-user=${{ matrix.config.db-user }} \
            --db-pass=${{ matrix.config.db-pass }}
        env:
          DB: ${{ matrix.config.database }}
          MOODLE_BRANCH: ${{ matrix.moodle-branch }}

      - name: PHP Lint
        if: ${{ success() }}
        run: moodle-plugin-ci phplint

      - name: PHP Copy/Paste Detector
        if: ${{ success() }}
        run: moodle-plugin-ci phpcpd

      - name: Moodle Code Checker
        if: ${{ success() }}
        run: moodle-plugin-ci codechecker

      - name: Moodle PHPDoc Checker
        if: ${{ success() }}
        run: moodle-plugin-ci phpdoc

      - name: Validate plugin structure
        if: ${{ success() }}
        run: moodle-plugin-ci validate

      - name: Check upgrade savepoints
        if: ${{ success() }}
        run: moodle-plugin-ci savepoints

      - name: PHPUnit tests
        if: ${{ success() }}
        run: moodle-plugin-ci phpunit --fail-on-warning
